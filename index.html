<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h2>Password Generator</h2>

    <div class="output-box">
      <!-- YA NO es readonly -->
      <input type="text" id="password" placeholder="Escribe o genera una contraseña">
      <button id="copyBtn">Copiar</button>
    </div>

    <div class="settings">

      <div class="length-box">
        <span>Longitud</span>
        <span id="lengthValue">12</span>
      </div>

      <input type="range" id="length" min="8" max="32" value="12">

      <label><input type="checkbox" id="uppercase" checked> Mayúsculas</label>
      <label><input type="checkbox" id="lowercase" checked> Minúsculas</label>
      <label><input type="checkbox" id="numbers" checked> Números</label>
      <label><input type="checkbox" id="symbols"> Símbolos</label>

      <div class="strength-box">
        <span>Seguridad</span>
        <div id="bars">
          <div></div><div></div><div></div><div></div>
        </div>
      </div>

      <button id="generate">Generar</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
