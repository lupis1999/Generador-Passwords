<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h2>Password Generator</h2>

    <div class="output-box">
      <input type="text" id="password" placeholder="P4$5W0rD!" readonly>
      <button id="copyBtn">📋</button>
    </div>

    <div class="settings">
      <div class="length-box">
        <span>Character Length</span>
        <span id="lengthValue">10</span>
      </div>

      <input type="range" id="length" min="8" max="32" value="10">

      <label><input type="checkbox" id="uppercase"> Include Uppercase Letters</label>
      <label><input type="checkbox" id="lowercase"> Include Lowercase Letters</label>
      <label><input type="checkbox" id="numbers"> Include Numbers</label>
      <label><input type="checkbox" id="symbols"> Include Symbols</label>

      <div class="strength-box">
        <span>STRENGTH</span>
        <div id="bars">
          <div></div><div></div><div></div><div></div>
        </div>
      </div>

      <button id="generate">GENERATE →</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
